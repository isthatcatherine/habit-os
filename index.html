<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Habit OS"/>
<title>Habit OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#07070d;--surface:#0d0d18;--border:#ffffff12;--text:#e8e8f0;--muted:#555;
    --green:#1aff8c;--amber:#ffaa00;--red:#ff6655;--blue:#00ccff;
    --font-display:'Bebas Neue',sans-serif;--font-mono:'DM Mono',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow-x:hidden}
  body{padding-bottom:80px}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333}

  /* HEADER */
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .logo{font-family:var(--font-display);font-size:28px;letter-spacing:2px;color:#fff;line-height:1}
  .logo span{color:var(--green)}
  .score-box{text-align:right}
  .score-num{font-family:var(--font-display);font-size:36px;line-height:1;transition:color 0.3s}
  .score-label{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px}
  .week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .week-label{flex:1;text-align:center;font-size:11px;color:#888;letter-spacing:1px}
  .week-label span{color:#333;margin-left:6px;font-size:10px}
  .nav-btn{background:var(--border);border:1px solid #ffffff18;color:#aaa;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
  .nav-btn:hover,.nav-btn:active{background:#1aff8c22;border-color:#1aff8c66;color:var(--green)}
  .tabs{display:flex;gap:0}
  .tab{flex:1;background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:10px 0;border-bottom:2px solid transparent;color:var(--muted);transition:all 0.2s}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}

  /* MAIN */
  .main{max-width:560px;margin:0 auto;padding:20px 16px 0}
  .section-label{font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;text-transform:uppercase}

  /* DAY SELECTOR */
  .day-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none}
  .day-strip::-webkit-scrollbar{display:none}
  .day-btn{background:#ffffff0a;border:1px solid var(--border);color:#888;cursor:pointer;border-radius:8px;padding:7px 13px;font-family:var(--font-mono);font-size:11px;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
  .day-btn.active{background:var(--green);color:#07070d;border-color:var(--green);font-weight:500}
  .day-btn:active{opacity:0.7}

  /* HABIT ROW */
  .habit-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #ffffff07}
  .habit-row:last-child{border-bottom:none}
  .check-btn{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--border);background:#ffffff08;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all 0.15s}
  .check-btn:active{transform:scale(0.9)}
  .check-btn.done{background:#1aff8c22;border-color:var(--green);color:var(--green)}
  .check-btn.cheat{background:#ffaa0022;border-color:var(--amber);color:var(--amber)}
  .habit-info{flex:1;min-width:0}
  .habit-name{font-size:13px;color:var(--text)}
  .habit-name.done{color:#e8e8f0}
  .habit-name.cheat{color:var(--amber)}
  .cheat-tag{font-size:9px;color:#ffaa0099;letter-spacing:1px;margin-top:1px}
  .week-dots{display:flex;gap:3px;flex-shrink:0}
  .dot{width:6px;height:6px;border-radius:50%;background:#ffffff18;transition:background 0.2s}
  .dot.done{background:var(--green)}
  .dot.cheat{background:var(--amber)}

  /* WEEKLY HABITS */
  .weekly-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #ffffff07}
  .weekly-row:last-child{border-bottom:none}
  .habit-icon{font-size:20px;width:36px;text-align:center;flex-shrink:0}
  .weekly-info{flex:1}
  .weekly-name{font-size:13px}
  .weekly-target{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px}
  .counter{display:flex;align-items:center;gap:8px}
  .cnt-btn{background:#ffffff08;border:1px solid var(--border);color:#aaa;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .cnt-btn:active{transform:scale(0.9);background:#1aff8c22}
  .cnt-num{font-family:var(--font-display);font-size:22px;width:26px;text-align:center;transition:color 0.2s}

  /* BOOK CARD */
  .card{background:#ffffff06;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px}
  .progress-bar{background:#ffffff0a;border-radius:4px;height:5px;overflow:hidden;margin:10px 0 6px}
  .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width 0.4s}
  .progress-info{display:flex;justify-content:space-between;font-size:11px}
  .progress-note{font-size:10px;color:#444;margin-top:6px}

  /* ASSESSMENT */
  .grade-card{display:flex;gap:14px;align-items:center;background:#ffffff06;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px}
  .grade-ring{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:32px;border:2px solid;flex-shrink:0;transition:all 0.3s}
  .grade-info{flex:1}
  .grade-headline{font-size:14px;font-weight:500;margin-bottom:5px;line-height:1.3}
  .grade-sub{font-size:12px;color:#888}
  .delta-up{color:var(--green)}
  .delta-down{color:var(--red)}

  .bar-row{margin-bottom:10px}
  .bar-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-track{background:#ffffff0a;border-radius:4px;height:4px}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.5s}

  .weekly-status{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #ffffff07;font-size:13px}
  .weekly-status:last-child{border-bottom:none}
  .status-check{font-size:13px;flex-shrink:0}

  .missed-item{background:#ff444411;border:1px solid #ff444433;border-radius:8px;padding:8px 12px;font-size:12px;color:#ff9999;margin-bottom:6px}
  .perfect-card{background:#1aff8c11;border:1px solid #1aff8c33;border-radius:12px;padding:16px;text-align:center;margin-bottom:20px}
  .perfect-title{font-size:15px;color:var(--green);font-family:var(--font-display);letter-spacing:1px;margin-bottom:4px}
  .perfect-sub{font-size:12px;color:#888}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;backdrop-filter:blur(12px)}
  .bnav-btn{flex:1;background:none;border:none;cursor:pointer;padding:12px 0;font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:var(--muted);transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .bnav-btn .bicon{font-size:18px}
  .bnav-btn.active{color:var(--green)}

  /* ANIMATIONS */
  @keyframes pop{0%{transform:scale(0.85);opacity:0}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop 0.18s ease-out}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .view{animation:fadein 0.2s ease-out}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">HABIT<span>OS</span></div>
      <div style="font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px">LIFESTYLE TRACKER</div>
    </div>
    <div class="score-box">
      <div class="score-num" id="scoreNum">0%</div>
      <div class="score-label">WEEK SCORE</div>
    </div>
  </div>
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="weekLabel">THIS WEEK</div>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-tracker" onclick="switchView('tracker')">Tracker</button>
    <button class="tab" id="tab-assessment" onclick="switchView('assessment')">Assessment</button>
  </div>
</div>

<div class="main">
  <!-- TRACKER VIEW -->
  <div id="view-tracker" class="view">
    <div class="day-strip" id="dayStrip"></div>

    <div class="section-label" id="dailyLabel">Daily Habits — Mon</div>
    <div id="dailyList"></div>

    <div style="height:24px"></div>
    <div class="section-label">Weekly Habits — Tap to Log</div>
    <div id="weeklyList"></div>

    <div style="height:24px"></div>
    <div class="card" id="bookCard"></div>
  </div>

  <!-- ASSESSMENT VIEW -->
  <div id="view-assessment" class="view" style="display:none">
    <div class="grade-card" id="gradeCard"></div>
    <div class="section-label">Daily Habit Completion</div>
    <div id="barList" style="margin-bottom:24px"></div>
    <div class="section-label">Weekly Habit Status</div>
    <div id="weeklyStatus" style="margin-bottom:24px"></div>
    <div id="missedSection"></div>
    <div class="card" id="readingCard"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-tracker" onclick="switchView('tracker')">
    <span class="bicon">✓</span>Tracker
  </button>
  <button class="bnav-btn" id="bnav-assessment" onclick="switchView('assessment')">
    <span class="bicon">📊</span>Assessment
  </button>
</div>

<script>
const DAILY = [
  {id:'sleep',label:'7-8 hrs Sleep',icon:'🌙'},
  {id:'teeth',label:'Brush Teeth 2×',icon:'🦷'},
  {id:'nojunk',label:'No Chips / Sugar',icon:'🚫',cheat:true},
  {id:'screen',label:'≤3hr Screen Time',icon:'📱'},
  {id:'reading',label:'Read 10-20 Pages',icon:'📖'},
  {id:'cardio',label:'30min Cardio',icon:'🚶'},
  {id:'steps',label:'10,000 Steps',icon:'👟'},
];
const WEEKLY = [
  {id:'run',label:'Run',icon:'🏃',target:'2-3×',min:2,max:3},
  {id:'stretch',label:'Stretch / Yoga',icon:'🧘',target:'3×',min:3,max:3},
  {id:'workout',label:'Workout',icon:'💪',target:'5-6×',min:5,max:6},
  {id:'hair',label:'Wash Hair',icon:'🚿',target:'2×',min:2,max:2},
  {id:'shave',label:'Shave',icon:'🪒',target:'1×',min:1,max:1},
];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const BOOKS_READ = 3, BOOKS_GOAL = 25, PPB = 300;

let weekOffset = 0;
let activeDay = (() => { const d = new Date().getDay(); return d===0?6:d-1; })();
let currentView = 'tracker';
let allData = {};

// STORAGE
function save() { try { localStorage.setItem('habitOS_data', JSON.stringify(allData)); } catch(e){} }
function load() { try { const d = localStorage.getItem('habitOS_data'); if(d) allData = JSON.parse(d); } catch(e){} }

// WEEK KEY
function getWeekKey(offset=0) {
  const now = new Date();
  const d = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((d+6)%7) + offset*7);
  return mon.toISOString().slice(0,10);
}

function getWeekData(key) {
  if (!allData[key]) allData[key] = {daily:{},weekly:{}};
  return allData[key];
}

// SCORE
function computeScore(wd) {
  let earned=0, total=0;
  DAILY.forEach(h => {
    DAYS.forEach((_,di) => { total++; const v=wd.daily?.[h.id]?.[di]; if(v===true||v==='cheat') earned++; });
  });
  WEEKLY.forEach(h => {
    const c = wd.weekly?.[h.id]||0;
    total += h.max; earned += Math.min(c, h.max);
  });
  return total>0 ? Math.round((earned/total)*100) : 0;
}

function scoreColor(s) { return s>=75?'var(--green)':s>=50?'var(--amber)':'var(--red)'; }

function gradeFromScore(s) { return s>=90?'S':s>=75?'A':s>=60?'B':s>=45?'C':'D'; }
function gradeColor(g) { return g==='S'?'var(--green)':g==='A'?'#88ff99':g==='B'?'var(--amber)':g==='C'?'#ffaa55':'var(--red)'; }
function headline(s) {
  if(s>=90) return "Exceptional week! 🔥";
  if(s>=75) return "Strong week — keep the momentum.";
  if(s>=60) return "Solid effort, room to grow.";
  if(s>=45) return "Mixed week — identify what slipped.";
  return "Tough week — reset and rebuild.";
}

// RENDER HEADER
function renderHeader() {
  const key = getWeekKey(weekOffset);
  const wd = getWeekData(key);
  const score = computeScore(wd);
  const el = document.getElementById('scoreNum');
  el.textContent = score+'%';
  el.style.color = scoreColor(score);
  const lbl = document.getElementById('weekLabel');
  const dateStr = `<span>${key}</span>`;
  if(weekOffset===0) lbl.innerHTML = 'THIS WEEK '+dateStr;
  else if(weekOffset===-1) lbl.innerHTML = 'LAST WEEK '+dateStr;
  else lbl.innerHTML = `WEEK OF ${dateStr}`;
  // disable future
  document.querySelector('.nav-btn:last-of-type').style.opacity = weekOffset>=0?'0.3':'1';
  document.querySelector('.nav-btn:last-of-type').disabled = weekOffset>=0;
}

// RENDER TRACKER
function renderTracker() {
  const key = getWeekKey(weekOffset);
  const wd = getWeekData(key);

  // Day strip
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = DAYS.map((d,i) => `
    <button class="day-btn${i===activeDay?' active':''}" onclick="setDay(${i})">${d}</button>
  `).join('');

  document.getElementById('dailyLabel').textContent = `Daily Habits — ${DAYS[activeDay]}`;

  // Daily habits
  const dl = document.getElementById('dailyList');
  dl.innerHTML = DAILY.map(h => {
    const val = wd.daily?.[h.id]?.[activeDay];
    const isDone = val===true, isCheat = val==='cheat';
    const cls = isDone?'done':isCheat?'cheat':'';
    const icon = isDone?'✓':isCheat?'○':h.icon;
    const dots = DAYS.map((_,di)=>{
      const v = wd.daily?.[h.id]?.[di];
      return `<div class="dot${v===true?' done':v==='cheat'?' cheat':''}"></div>`;
    }).join('');
    return `
      <div class="habit-row">
        <button class="check-btn ${cls}" onclick="toggleDaily('${h.id}',${activeDay})">${icon}</button>
        <div class="habit-info">
          <div class="habit-name ${cls}">${h.label}</div>
          ${isCheat?'<div class="cheat-tag">CHEAT DAY</div>':''}
        </div>
        <div class="week-dots">${dots}</div>
      </div>`;
  }).join('');

  // Weekly habits
  const wl = document.getElementById('weeklyList');
  wl.innerHTML = WEEKLY.map(h => {
    const count = wd.weekly?.[h.id]||0;
    const met = count>=h.min, over = count>=h.max;
    const color = over?'var(--green)':met?'#88ddaa':count>0?'var(--amber)':'var(--muted)';
    return `
      <div class="weekly-row">
        <div class="habit-icon">${h.icon}</div>
        <div class="weekly-info">
          <div class="weekly-name">${h.label}</div>
          <div class="weekly-target">TARGET ${h.target}</div>
        </div>
        <div class="counter">
          <button class="cnt-btn" onclick="adjustWeekly('${h.id}',-1)">−</button>
          <div class="cnt-num" style="color:${color}">${count}</div>
          <button class="cnt-btn" onclick="adjustWeekly('${h.id}',1)">+</button>
        </div>
      </div>`;
  }).join('');

  // Book card
  const readingDays = Object.values(wd.daily?.reading||{}).filter(Boolean).length;
  const pct = Math.round((BOOKS_READ/BOOKS_GOAL)*100);
  const weeksLeft = Math.ceil((BOOKS_GOAL-BOOKS_READ)*PPB/(7*15));
  document.getElementById('bookCard').innerHTML = `
    <div class="section-label" style="margin-bottom:10px">📚 Reading Goal 2025</div>
    <div class="progress-info">
      <span style="font-size:12px;color:#888">${BOOKS_READ} / ${BOOKS_GOAL} books</span>
      <span style="font-size:12px;color:var(--green)">~${(readingDays*15/PPB).toFixed(1)} books this week</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-note">${BOOKS_GOAL-BOOKS_READ} books remaining · ~${weeksLeft} weeks at current pace</div>
  `;
}

// RENDER ASSESSMENT
function renderAssessment() {
  const key = getWeekKey(weekOffset);
  const prevKey = getWeekKey(weekOffset-1);
  const wd = getWeekData(key);
  const pwd = allData[prevKey];
  const score = computeScore(wd);
  const prevScore = pwd ? computeScore(pwd) : null;
  const delta = prevScore!==null ? score-prevScore : null;
  const grade = gradeFromScore(score);
  const gc = gradeColor(grade);

  // Grade card
  let deltaHtml = '';
  if(delta!==null) {
    const cls = delta>=0?'delta-up':'delta-down';
    deltaHtml = `<span class="${cls}" style="margin-left:8px">${delta>=0?'▲':'▼'} ${Math.abs(delta)}% vs last week</span>`;
  }
  document.getElementById('gradeCard').innerHTML = `
    <div class="grade-ring" style="border-color:${gc};color:${gc};background:${gc}18">${grade}</div>
    <div class="grade-info">
      <div class="grade-headline">${headline(score)}</div>
      <div class="grade-sub">Score: <span style="color:var(--text)">${score}%</span>${deltaHtml}</div>
    </div>`;

  // Bars
  const barList = document.getElementById('barList');
  barList.innerHTML = DAILY.map(h => {
    const days = DAYS.filter((_,di) => wd.daily?.[h.id]?.[di]).length;
    const pct = Math.round((days/7)*100);
    const c = pct>=85?'var(--green)':pct>=57?'var(--amber)':'var(--red)';
    return `
      <div class="bar-row">
        <div class="bar-header"><span>${h.icon} ${h.label}</span><span style="color:${c}">${days}/7</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div>
      </div>`;
  }).join('');

  // Weekly status
  document.getElementById('weeklyStatus').innerHTML = WEEKLY.map(h => {
    const count = wd.weekly?.[h.id]||0;
    const met = count>=h.min;
    return `
      <div class="weekly-status">
        <span>${h.icon}</span>
        <span style="flex:1">${h.label}</span>
        <span class="status-check" style="color:${met?'var(--green)':'var(--red)'}">${met?'✓':'✗'} ${count}/${h.min}</span>
      </div>`;
  }).join('');

  // Missed / perfect
  const missed = [];
  DAILY.forEach(h => {
    const d = DAYS.filter((_,di) => !wd.daily?.[h.id]?.[di]).length;
    if(d>=3) missed.push(`${h.label} (missed ${d} days)`);
  });
  WEEKLY.forEach(h => {
    const c = wd.weekly?.[h.id]||0;
    if(c<h.min) missed.push(`${h.label} (${c}/${h.min} min)`);
  });

  const ms = document.getElementById('missedSection');
  if(missed.length===0) {
    ms.innerHTML = `<div class="perfect-card"><div class="perfect-title">💯 PERFECT WEEK</div><div class="perfect-sub">All habits completed. Maintain this consistency!</div></div>`;
  } else {
    ms.innerHTML = `<div class="section-label" style="margin-bottom:10px">Focus for Next Week</div>`
      + missed.map(m=>`<div class="missed-item">⚠ ${m}</div>`).join('')
      + '<div style="height:20px"></div>';
  }

  // Reading card
  const readingDays = Object.values(wd.daily?.reading||{}).filter(Boolean).length;
  const endDate = new Date(Date.now()+((BOOKS_GOAL-BOOKS_READ)*PPB/15)*86400000).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  document.getElementById('readingCard').innerHTML = `
    <div class="section-label" style="margin-bottom:10px">📚 Books Goal Status</div>
    <div style="font-size:13px;color:#888;line-height:1.9">
      <div>Books read: <span style="color:var(--text)">${BOOKS_READ} / ${BOOKS_GOAL}</span></div>
      <div>Reading days this week: <span style="color:var(--text)">${readingDays} / 7</span></div>
      <div>Est. pages this week: <span style="color:var(--green)">${readingDays*15}–${readingDays*20}</span></div>
      <div style="font-size:10px;color:#444;margin-top:6px">At 15 pages/day: finish by ${endDate}</div>
    </div>`;
}

// INTERACTIONS
function changeWeek(dir) {
  if(dir>0 && weekOffset>=0) return;
  weekOffset += dir;
  renderAll();
}

function setDay(i) {
  activeDay = i;
  renderTracker();
}

function toggleDaily(id, di) {
  const key = getWeekKey(weekOffset);
  const wd = getWeekData(key);
  if(!wd.daily[id]) wd.daily[id] = {};
  const cur = wd.daily[id][di];
  const h = DAILY.find(x=>x.id===id);
  wd.daily[id][di] = !cur ? true : (cur===true && h?.cheat) ? 'cheat' : false;
  save(); renderAll();
}

function adjustWeekly(id, delta) {
  const key = getWeekKey(weekOffset);
  const wd = getWeekData(key);
  wd.weekly[id] = Math.max(0, (wd.weekly[id]||0)+delta);
  save(); renderAll();
}

function switchView(v) {
  currentView = v;
  document.getElementById('view-tracker').style.display = v==='tracker'?'block':'none';
  document.getElementById('view-assessment').style.display = v==='assessment'?'block':'none';
  document.getElementById('tab-tracker').className = 'tab'+(v==='tracker'?' active':'');
  document.getElementById('tab-assessment').className = 'tab'+(v==='assessment'?' active':'');
  document.getElementById('bnav-tracker').className = 'bnav-btn'+(v==='tracker'?' active':'');
  document.getElementById('bnav-assessment').className = 'bnav-btn'+(v==='assessment'?' active':'');
  if(v==='assessment') renderAssessment();
}

function renderAll() {
  renderHeader();
  if(currentView==='tracker') renderTracker();
  else renderAssessment();
}

// INIT
load();
renderAll();
</script>
</body>
</html>
