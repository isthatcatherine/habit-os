<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Habit OS"/>
<title>Habit OS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
 
  /* LIGHT MODE (default) */
  :root{
    --bg:#f4f4f0;--surface:#ffffff;--border:#e0e0d8;--text:#1a1a1a;--muted:#999;
    --green:#00a85a;--amber:#d97700;--red:#e03030;--blue:#0077cc;
    --green-soft:#e6f9f0;--amber-soft:#fff4e0;--red-soft:#fdeaea;
    --shadow:0 1px 6px #00000010;--shadow-lg:0 1px 12px #00000010;
    --dot-empty:#e0e0d8;--habit-unchecked:#fafafa;--row-border:#f0f0ec;
    --cnt-bg:#f0f0ec;--bar-empty:#f0f0ec;--week-date:#ccc;
  }
 
  /* DARK MODE */
  body.dark{
    --bg:#07070d;--surface:#0d0d18;--border:#ffffff12;--text:#e8e8f0;--muted:#555;
    --green:#1aff8c;--amber:#ffaa00;--red:#ff6655;--blue:#00ccff;
    --green-soft:#1aff8c22;--amber-soft:#ffaa0022;--red-soft:#ff444411;
    --shadow:none;--shadow-lg:none;
    --dot-empty:#ffffff18;--habit-unchecked:#ffffff08;--row-border:#ffffff07;
    --cnt-bg:#ffffff08;--bar-empty:#ffffff0a;--week-date:#333;
  }
 
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;transition:background 0.3s,color 0.3s}
  body{padding-bottom:80px}
  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border)}
 
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 16px 0;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg);transition:background 0.3s,border-color 0.3s}
  .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--text);line-height:1}
  .logo span{color:var(--green)}
  .header-right{display:flex;align-items:center;gap:12px}
  .score-box{text-align:right}
  .score-num{font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;transition:color 0.3s}
  .score-label{font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px}
 
  .theme-toggle{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--cnt-bg);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
  .theme-toggle:active{transform:scale(0.9)}
 
  .week-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .week-label{flex:1;text-align:center;font-size:11px;color:#888;letter-spacing:1px}
  .week-label span{color:var(--week-date);margin-left:6px;font-size:10px}
  .nav-btn{background:var(--cnt-bg);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
  .nav-btn:active{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .tabs{display:flex}
  .tab{flex:1;background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:10px 0;border-bottom:2px solid transparent;color:var(--muted);transition:all 0.2s}
  .tab.active{color:var(--green);border-bottom-color:var(--green)}
 
  .main{max-width:560px;margin:0 auto;padding:20px 16px 0}
  .section-label{font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:12px;text-transform:uppercase}
 
  .day-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none}
  .day-strip::-webkit-scrollbar{display:none}
  .day-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:8px;padding:7px 13px;font-family:'DM Mono',monospace;font-size:11px;white-space:nowrap;transition:all 0.2s;flex-shrink:0;box-shadow:var(--shadow)}
  .day-btn.active{background:var(--green);color:#fff;border-color:var(--green);font-weight:500}
  .day-btn:active{opacity:0.7}
 
  .habit-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--row-border)}
  .habit-row:last-child{border-bottom:none}
  .check-btn{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--border);background:var(--habit-unchecked);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all 0.15s}
  .check-btn:active{transform:scale(0.9)}
  .check-btn.done{background:var(--green-soft);border-color:var(--green);color:var(--green)}
  .check-btn.cheat{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
  .habit-info{flex:1;min-width:0}
  .habit-name{font-size:13px;color:var(--muted)}
  .habit-name.done{color:var(--text)}
  .habit-name.cheat{color:var(--amber)}
  .cheat-tag{font-size:9px;color:var(--amber);opacity:0.6;letter-spacing:1px;margin-top:1px}
  .week-dots{display:flex;gap:3px;flex-shrink:0}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--dot-empty);transition:background 0.2s}
  .dot.done{background:var(--green)}
  .dot.cheat{background:var(--amber)}
 
  .weekly-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--row-border)}
  .weekly-row:last-child{border-bottom:none}
  .habit-icon{font-size:20px;width:36px;text-align:center;flex-shrink:0}
  .weekly-info{flex:1}
  .weekly-name{font-size:13px;color:var(--text)}
  .weekly-target{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px}
  .counter{display:flex;align-items:center;gap:8px}
  .cnt-btn{background:var(--cnt-bg);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  .cnt-btn:active{transform:scale(0.9);background:var(--green-soft)}
  .cnt-num{font-family:'Bebas Neue',sans-serif;font-size:22px;width:26px;text-align:center;transition:color 0.2s}
 
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:20px;box-shadow:var(--shadow)}
  .progress-bar{background:var(--bar-empty);border-radius:4px;height:5px;overflow:hidden;margin:10px 0 6px}
  .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--blue));transition:width 0.4s}
  .progress-info{display:flex;justify-content:space-between;font-size:11px}
  .progress-note{font-size:10px;color:var(--muted);margin-top:6px}
 
  .grade-card{display:flex;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;box-shadow:var(--shadow)}
  .grade-ring{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:32px;border:2px solid;flex-shrink:0;transition:all 0.3s}
  .grade-info{flex:1}
  .grade-headline{font-size:14px;font-weight:500;margin-bottom:5px;line-height:1.3}
  .grade-sub{font-size:12px;color:var(--muted)}
  .delta-up{color:var(--green)}
  .delta-down{color:var(--red)}
 
  .bar-row{margin-bottom:10px}
  .bar-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .bar-track{background:var(--bar-empty);border-radius:4px;height:4px}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
 
  .weekly-status{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--row-border);font-size:13px}
  .weekly-status:last-child{border-bottom:none}
 
  .missed-item{background:var(--red-soft);border:1px solid var(--red);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:6px;opacity:0.85}
  .perfect-card{background:var(--green-soft);border:1px solid var(--green);border-radius:12px;padding:16px;text-align:center;margin-bottom:20px}
  .perfect-title{font-size:15px;color:var(--green);font-family:'Bebas Neue',sans-serif;letter-spacing:1px;margin-bottom:4px}
  .perfect-sub{font-size:12px;color:var(--green);opacity:0.7}
 
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -1px 12px #00000010;transition:background 0.3s}
  .bnav-btn{flex:1;background:none;border:none;cursor:pointer;padding:12px 0;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .bnav-btn .bicon{font-size:18px}
  .bnav-btn.active{color:var(--green)}
 
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .view{animation:fadein 0.2s ease-out}
</style>
</head>
<body>
 
<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">HABIT<span>OS</span></div>
      <div style="font-size:9px;color:var(--muted);letter-spacing:3px;margin-top:2px">LIFESTYLE TRACKER</div>
    </div>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <div class="score-box">
        <div class="score-num" id="scoreNum">0%</div>
        <div class="score-label">WEEK SCORE</div>
      </div>
    </div>
  </div>
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="weekLabel">THIS WEEK</div>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-tracker" onclick="switchView('tracker')">Tracker</button>
    <button class="tab" id="tab-assessment" onclick="switchView('assessment')">Assessment</button>
  </div>
</div>
 
<div class="main">
  <div id="view-tracker" class="view">
    <div class="day-strip" id="dayStrip"></div>
    <div class="section-label" id="dailyLabel">Daily Habits — Mon</div>
    <div id="dailyList"></div>
    <div style="height:24px"></div>
    <div class="section-label">Weekly Habits — Tap to Log</div>
    <div id="weeklyList"></div>
    <div style="height:24px"></div>
    <div class="card" id="bookCard"></div>
  </div>
 
  <div id="view-assessment" class="view" style="display:none">
    <div class="grade-card" id="gradeCard"></div>
    <div class="section-label">Daily Habit Completion</div>
    <div id="barList" style="margin-bottom:24px"></div>
    <div class="section-label">Weekly Habit Status</div>
    <div id="weeklyStatus" style="margin-bottom:24px"></div>
    <div id="missedSection"></div>
    <div class="card" id="readingCard"></div>
  </div>
</div>
 
<div class="bottom-nav">
  <button class="bnav-btn active" id="bnav-tracker" onclick="switchView('tracker')">
    <span class="bicon">✓</span>Tracker
  </button>
  <button class="bnav-btn" id="bnav-assessment" onclick="switchView('assessment')">
    <span class="bicon">📊</span>Assessment
  </button>
</div>
 
<script>
const DAILY=[
  {id:'sleep',label:'7-8 hrs Sleep',icon:'🌙'},
  {id:'teeth',label:'Brush Teeth 2×',icon:'🦷'},
  {id:'nojunk',label:'No Chips / Sugar',icon:'🚫',cheat:true},
  {id:'screen',label:'≤3hr Screen Time',icon:'📱'},
  {id:'reading',label:'Read 10-20 Pages',icon:'📖'},
  {id:'cardio',label:'30min Cardio',icon:'🚶'},
  {id:'steps',label:'10,000 Steps',icon:'👟'},
];
const WEEKLY=[
  {id:'run',label:'Run',icon:'🏃',target:'2-3×',min:2,max:3},
  {id:'stretch',label:'Stretch / Yoga',icon:'🧘',target:'3×',min:3,max:3},
  {id:'workout',label:'Workout',icon:'💪',target:'5-6×',min:5,max:6},
  {id:'hair',label:'Wash Hair',icon:'🚿',target:'2×',min:2,max:2},
  {id:'shave',label:'Shave',icon:'🪒',target:'1×',min:1,max:1},
];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const BOOKS_GOAL=25,PPB=300;
let weekOffset=0,activeDay=(()=>{const d=new Date().getDay();return d===0?6:d-1;})(),currentView='tracker';
 
// ── STORAGE ──────────────────────────────────────────────────────────────────
// dailyData  : { "YYYY-MM-DD": { habitId: true|"cheat"|false } }
// weeklyData : { "YYYY-MM-DD" (monday): { habitId: count } }
// booksRead, theme stored separately
let dailyData={}, weeklyData={}, booksRead=3, isDark=false;
 
function save(){
  try{
    localStorage.setItem('habitOS_daily', JSON.stringify(dailyData));
    localStorage.setItem('habitOS_weekly', JSON.stringify(weeklyData));
    localStorage.setItem('habitOS_books', booksRead);
    localStorage.setItem('habitOS_theme', isDark?'dark':'light');
  }catch(e){ alert('Storage full — clear some browser data.'); }
}
function load(){
  try{
    const d=localStorage.getItem('habitOS_daily'); if(d) dailyData=JSON.parse(d);
    const w=localStorage.getItem('habitOS_weekly'); if(w) weeklyData=JSON.parse(w);
    const b=localStorage.getItem('habitOS_books'); if(b) booksRead=parseInt(b)||3;
    const t=localStorage.getItem('habitOS_theme');
    if(t==='dark'){isDark=true;document.body.classList.add('dark');document.getElementById('themeBtn').textContent='☀️';}
  }catch(e){}
}
 
// ── DATE HELPERS ──────────────────────────────────────────────────────────────
// Returns "YYYY-MM-DD" for the Monday of the week at offset
function getMondayKey(offset=0){
  const now=new Date();
  const d=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-((d+6)%7)+offset*7);
  return mon.toISOString().slice(0,10);
}
// Returns "YYYY-MM-DD" for a specific day index (0=Mon) in a given week
function getDayKey(mondayKey, dayIndex){
  const mon=new Date(mondayKey);
  mon.setDate(mon.getDate()+dayIndex);
  return mon.toISOString().slice(0,10);
}
// Returns all 7 date strings for the week
function getWeekDates(mondayKey){
  return DAYS.map((_,i)=>getDayKey(mondayKey,i));
}
 
// ── ACCESSORS ─────────────────────────────────────────────────────────────────
function getDailyVal(dateKey, habitId){ return dailyData[dateKey]?.[habitId] ?? false; }
function setDailyVal(dateKey, habitId, val){
  if(!dailyData[dateKey]) dailyData[dateKey]={};
  dailyData[dateKey][habitId]=val;
}
function getWeeklyCount(mondayKey, habitId){ return weeklyData[mondayKey]?.[habitId] || 0; }
function setWeeklyCount(mondayKey, habitId, val){
  if(!weeklyData[mondayKey]) weeklyData[mondayKey]={};
  weeklyData[mondayKey][habitId]=Math.max(0,val);
}
 
// ── SCORING ───────────────────────────────────────────────────────────────────
function computeScore(mondayKey){
  let e=0,t=0;
  const dates=getWeekDates(mondayKey);
  DAILY.forEach(h=>{
    dates.forEach(dk=>{ t++; const v=getDailyVal(dk,h.id); if(v===true||v==='cheat') e++; });
  });
  WEEKLY.forEach(h=>{
    const c=getWeeklyCount(mondayKey,h.id);
    t+=h.max; e+=Math.min(c,h.max);
  });
  return t>0?Math.round((e/t)*100):0;
}
 
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';
  save();
}
 
function scoreColor(s){return s>=75?'var(--green)':s>=50?'var(--amber)':'var(--red)';}
function gradeFromScore(s){return s>=90?'S':s>=75?'A':s>=60?'B':s>=45?'C':'D';}
function gradeColor(g){if(g==='S')return'var(--green)';if(g==='A')return isDark?'#88ff99':'#22aa66';if(g==='B')return'var(--amber)';if(g==='C')return isDark?'#ffaa55':'#cc8800';return'var(--red)';}
function headline(s){if(s>=90)return"Exceptional week! 🔥";if(s>=75)return"Strong week — keep the momentum.";if(s>=60)return"Solid effort, room to grow.";if(s>=45)return"Mixed week — identify what slipped.";return"Tough week — reset and rebuild.";}
 
// ── RENDER HEADER ─────────────────────────────────────────────────────────────
function renderHeader(){
  const monday=getMondayKey(weekOffset);
  const score=computeScore(monday);
  const el=document.getElementById('scoreNum');el.textContent=score+'%';el.style.color=scoreColor(score);
  const lbl=document.getElementById('weekLabel');const ds=`<span>${monday}</span>`;
  if(weekOffset===0)lbl.innerHTML='THIS WEEK '+ds;
  else if(weekOffset===-1)lbl.innerHTML='LAST WEEK '+ds;
  else lbl.innerHTML='WEEK OF '+ds;
  const fb=document.querySelector('.nav-btn:last-of-type');
  fb.style.opacity=weekOffset>=0?'0.3':'1';fb.disabled=weekOffset>=0;
}
 
// ── RENDER TRACKER ────────────────────────────────────────────────────────────
function renderTracker(){
  const monday=getMondayKey(weekOffset);
  const dates=getWeekDates(monday);
  const todayKey=getDayKey(monday,activeDay);
 
  document.getElementById('dayStrip').innerHTML=DAYS.map((d,i)=>{
    const dk=getDayKey(monday,i);
    const hasData=DAILY.some(h=>getDailyVal(dk,h.id));
    return`<button class="day-btn${i===activeDay?' active':''}" onclick="setDay(${i})">${d}${hasData&&i!==activeDay?'<span style="display:block;width:4px;height:4px;border-radius:50%;background:currentColor;margin:2px auto 0;opacity:0.5"></span>':''}</button>`;
  }).join('');
 
  document.getElementById('dailyLabel').textContent=`Daily Habits — ${DAYS[activeDay]} (${todayKey})`;
 
  document.getElementById('dailyList').innerHTML=DAILY.map(h=>{
    const val=getDailyVal(todayKey,h.id);
    const isDone=val===true,isCheat=val==='cheat';
    const cls=isDone?'done':isCheat?'cheat':'';
    const icon=isDone?'✓':isCheat?'○':h.icon;
    const dots=dates.map(dk=>{const v=getDailyVal(dk,h.id);return`<div class="dot${v===true?' done':v==='cheat'?' cheat':''}"></div>`;}).join('');
    return`<div class="habit-row"><button class="check-btn ${cls}" onclick="toggleDaily('${h.id}')">${icon}</button><div class="habit-info"><div class="habit-name ${cls}">${h.label}</div>${isCheat?'<div class="cheat-tag">CHEAT DAY</div>':''}</div><div class="week-dots">${dots}</div></div>`;
  }).join('');
 
  document.getElementById('weeklyList').innerHTML=WEEKLY.map(h=>{
    const count=getWeeklyCount(monday,h.id);
    const met=count>=h.min,over=count>=h.max;
    const color=over?'var(--green)':met?'var(--green)':count>0?'var(--amber)':'var(--muted)';
    return`<div class="weekly-row"><div class="habit-icon">${h.icon}</div><div class="weekly-info"><div class="weekly-name">${h.label}</div><div class="weekly-target">TARGET ${h.target}</div></div><div class="counter"><button class="cnt-btn" onclick="adjustWeekly('${h.id}',-1)">−</button><div class="cnt-num" style="color:${color}">${count}</div><button class="cnt-btn" onclick="adjustWeekly('${h.id}',1)">+</button></div></div>`;
  }).join('');
 
  const rd=dates.filter(dk=>getDailyVal(dk,'reading')).length;
  const pct=Math.round((booksRead/BOOKS_GOAL)*100);
  const wl=Math.ceil((BOOKS_GOAL-booksRead)*PPB/(7*15));
  document.getElementById('bookCard').innerHTML=`<div class="section-label" style="margin-bottom:10px">📚 Reading Goal 2025</div><div class="progress-info"><span style="font-size:12px;color:var(--muted)">${booksRead} / ${BOOKS_GOAL} books</span><span style="font-size:12px;color:var(--green)">~${(rd*15/PPB).toFixed(1)} books this week</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-note">${BOOKS_GOAL-booksRead} remaining · ~${wl} weeks at current pace</div><div style="margin-top:12px;display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--muted)">Books read:</span><button class="cnt-btn" onclick="changeBooks(-1)">−</button><span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);width:28px;text-align:center">${booksRead}</span><button class="cnt-btn" onclick="changeBooks(1)">+</button></div>`;
}
 
// ── RENDER ASSESSMENT ─────────────────────────────────────────────────────────
function renderAssessment(){
  const monday=getMondayKey(weekOffset);
  const prevMonday=getMondayKey(weekOffset-1);
  const dates=getWeekDates(monday);
  const score=computeScore(monday);
  const prevScore=computeScore(prevMonday);
  // only show delta if prev week has any data
  const prevHasData=DAILY.some(h=>getWeekDates(prevMonday).some(dk=>getDailyVal(dk,h.id)));
  const delta=prevHasData?score-prevScore:null;
  const grade=gradeFromScore(score);const gc=gradeColor(grade);
 
  let dh='';
  if(delta!==null){const cls=delta>=0?'delta-up':'delta-down';dh=`<span class="${cls}" style="margin-left:8px">${delta>=0?'▲':'▼'} ${Math.abs(delta)}% vs last week</span>`;}
  document.getElementById('gradeCard').innerHTML=`<div class="grade-ring" style="border-color:${gc};color:${gc};background:${gc}22">${grade}</div><div class="grade-info"><div class="grade-headline">${headline(score)}</div><div class="grade-sub">Score: <span style="color:var(--text)">${score}%</span>${dh}</div></div>`;
 
  document.getElementById('barList').innerHTML=DAILY.map(h=>{
    const doneDays=dates.filter(dk=>{const v=getDailyVal(dk,h.id);return v===true||v==='cheat';}).length;
    const pct=Math.round((doneDays/7)*100);
    const c=pct>=85?'var(--green)':pct>=57?'var(--amber)':'var(--red)';
    return`<div class="bar-row"><div class="bar-header"><span>${h.icon} ${h.label}</span><span style="color:${c}">${doneDays}/7</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
  }).join('');
 
  document.getElementById('weeklyStatus').innerHTML=WEEKLY.map(h=>{
    const count=getWeeklyCount(monday,h.id);const met=count>=h.min;
    return`<div class="weekly-status"><span>${h.icon}</span><span style="flex:1">${h.label}</span><span style="color:${met?'var(--green)':'var(--red)'};font-size:13px">${met?'✓':'✗'} ${count}/${h.min}</span></div>`;
  }).join('');
 
  const missed=[];
  DAILY.forEach(h=>{
    const missedDays=dates.filter(dk=>!getDailyVal(dk,h.id)).length;
    if(missedDays>=3) missed.push(`${h.label} (missed ${missedDays} days)`);
  });
  WEEKLY.forEach(h=>{const c=getWeeklyCount(monday,h.id);if(c<h.min)missed.push(`${h.label} (${c}/${h.min} min)`);});
 
  const ms=document.getElementById('missedSection');
  if(missed.length===0){ms.innerHTML=`<div class="perfect-card"><div class="perfect-title">💯 PERFECT WEEK</div><div class="perfect-sub">All habits completed. Maintain this consistency!</div></div>`;}
  else{ms.innerHTML=`<div class="section-label" style="margin-bottom:10px">Focus for Next Week</div>`+missed.map(m=>`<div class="missed-item">⚠ ${m}</div>`).join('')+'<div style="height:20px"></div>';}
 
  const rd=dates.filter(dk=>getDailyVal(dk,'reading')).length;
  const endDate=new Date(Date.now()+((BOOKS_GOAL-booksRead)*PPB/15)*86400000).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  document.getElementById('readingCard').innerHTML=`<div class="section-label" style="margin-bottom:10px">📚 Books Goal Status</div><div style="font-size:13px;color:var(--muted);line-height:1.9"><div>Books read: <span style="color:var(--text)">${booksRead} / ${BOOKS_GOAL}</span></div><div>Reading days this week: <span style="color:var(--text)">${rd} / 7</span></div><div>Est. pages this week: <span style="color:var(--green)">${rd*15}–${rd*20}</span></div><div style="font-size:10px;color:var(--muted);margin-top:6px">At 15 pages/day: finish by ${endDate}</div></div>`;
}
 
// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function changeWeek(dir){if(dir>0&&weekOffset>=0)return;weekOffset+=dir;renderAll();}
function setDay(i){activeDay=i;renderTracker();}
 
function toggleDaily(id){
  const monday=getMondayKey(weekOffset);
  const dateKey=getDayKey(monday,activeDay);
  const cur=getDailyVal(dateKey,id);
  const h=DAILY.find(x=>x.id===id);
  const next=!cur?true:(cur===true&&h?.cheat)?'cheat':false;
  setDailyVal(dateKey,id,next);
  save();renderAll();
}
 
function adjustWeekly(id,delta){
  const monday=getMondayKey(weekOffset);
  setWeeklyCount(monday,id,getWeeklyCount(monday,id)+delta);
  save();renderAll();
}
 
function changeBooks(delta){booksRead=Math.max(0,Math.min(BOOKS_GOAL,booksRead+delta));save();renderAll();}
 
function switchView(v){
  currentView=v;
  document.getElementById('view-tracker').style.display=v==='tracker'?'block':'none';
  document.getElementById('view-assessment').style.display=v==='assessment'?'block':'none';
  document.getElementById('tab-tracker').className='tab'+(v==='tracker'?' active':'');
  document.getElementById('tab-assessment').className='tab'+(v==='assessment'?' active':'');
  document.getElementById('bnav-tracker').className='bnav-btn'+(v==='tracker'?' active':'');
  document.getElementById('bnav-assessment').className='bnav-btn'+(v==='assessment'?' active':'');
  if(v==='assessment')renderAssessment();
}
 
function renderAll(){renderHeader();if(currentView==='tracker')renderTracker();else renderAssessment();}
 
load();renderAll();
</script>
